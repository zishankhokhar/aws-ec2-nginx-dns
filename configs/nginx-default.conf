# Default NGINX config reference
# Location on Amazon Linux: /etc/nginx/nginx.conf
# Location on Ubuntu: /etc/nginx/sites-available/default

server {
    listen 80;
    listen [::]:80;

    server_name yourdomain.com www.yourdomain.com;

    root /usr/share/nginx/html;     # Amazon Linux
    # root /var/www/html;           # Ubuntu

    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    # Optional: logs
    access_log /var/log/nginx/yourdomain.access.log;
    error_log  /var/log/nginx/yourdomain.error.log;
}

# -------------------------------------------------------
# Useful NGINX commands:
#
# Test config:          sudo nginx -t
# Reload config:        sudo nginx -s reload
# Start:                sudo systemctl start nginx
# Stop:                 sudo systemctl stop nginx
# Restart:              sudo systemctl restart nginx
# Enable on boot:       sudo systemctl enable nginx
# Status:               sudo systemctl status nginx
# View access log:      sudo tail -f /var/log/nginx/access.log
# View error log:       sudo tail -f /var/log/nginx/error.log
# -------------------------------------------------------
